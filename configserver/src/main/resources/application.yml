#spring.application.name=configserver
server:
  port: 8071

build:
  version: "1.0.0"

spring:
  application:
    name: "configserver"
  profiles:
    active: native
    #if config is into github
    #active: git
  cloud:
    config:
      server:
        native:
          search-locations: "C:/Users/netsd/OneDrive/Desktop/JavaMicroservices/project/configserver/src/main/resources/config"


encrypt:
  key: "AAAAC3NzaC1lZDI1NTE5AAAAIF8WD4RgCQfpAQQ0eIdgSoU18lRarvbqXleVfNTm1s2"

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

environment:
  SPRING_APPLICATION_NAME: "configserver"
  SPRING_PROFILES_ACTIVE: "native"
  SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: "classpath:/config"
  BUILD_VERSION: "1.0.0"

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{trace_id},%X{span_id}]"